name: Deploy scan functions (manual)

# Honest-broker: NOTHING auto-deploys. This workflow only runs when a human
# clicks "Run workflow" in the Actions tab and types "deploy" to confirm.
# The marketing site (web/) deploys separately via DigitalOcean App Platform
# deploy-on-push; this workflow covers the DO serverless scan functions only.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm deploying scan functions to production'
        required: true
        default: ''

jobs:
  deploy:
    name: Deploy DO Functions
    runs-on: ubuntu-latest
    # Hard gate: the typed confirmation must match.
    if: ${{ github.event.inputs.confirm == 'deploy' }}
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Re-run the unit tests as a pre-deploy gate.
      - run: npm test
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          # Add this in repo Settings > Secrets and variables > Actions.
          # Use a scoped DO API token (NOT a personal full-access token).
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - name: Sync libs, connect namespace, deploy
        run: |
          npm run sync
          doctl serverless install || true
          # If you have more than one namespace, pass its label/id explicitly:
          #   doctl serverless connect promptgoblin
          doctl serverless connect
          doctl serverless deploy . --remote-build
      # Best-effort: resubmit the live sitemap's URLs to IndexNow. Our /indexnow
      # endpoint REQUIRES a non-empty urlList (a bare {"host":...} 400s), so we
      # pull <loc> entries from the deployed sitemap and send those. Marked
      # continue-on-error so a ping failure is visible but never rolls back a
      # successful functions deploy — and we no longer mask errors with a fake
      # "skipped" echo.
      - name: Notify IndexNow (resubmit sitemap URLs)
        if: success()
        continue-on-error: true
        run: |
          set -euo pipefail
          urls=$(curl -sS --fail https://promptgoblin.io/sitemap.xml \
            | grep -oE '<loc>[^<]+</loc>' | sed -E 's#</?loc>##g')
          [ -n "$urls" ] || { echo 'No sitemap URLs found — nothing to submit'; exit 1; }
          payload=$(printf '%s\n' "$urls" | jq -R . | jq -s '{urlList: .}')
          echo "Submitting $(printf '%s\n' "$urls" | wc -l) URL(s) to IndexNow"
          curl -sS --fail -X POST https://promptgoblin.io/indexnow \
            -H 'Content-Type: application/json' -d "$payload"
