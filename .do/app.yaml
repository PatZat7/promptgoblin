# DigitalOcean App Platform spec — Prompt Goblin marketing site
# Next.js 16 app in web/, built to a STATIC EXPORT (web/out) and served as static
# assets — same static hosting model as before, now with a build step.
#
# Apply:  doctl apps update b2fc9d71-4cf8-41b0-ad84-696043cd2def --spec .do/app.yaml
#   (or via the DigitalOcean MCP / dashboard)
name: promptgoblin
region: nyc
features:
  - buildpack-stack=ubuntu-22
static_sites:
  - name: promptgoblin-site
    github:
      repo: PatZat7/promptgoblin
      branch: main
      deploy_on_push: true
    source_dir: web              # buildpack detects web/package.json (Node)
    build_command: npm ci --include=dev && npm run build
    output_dir: out              # next.config output:'export' → web/out
    index_document: index.html
    catchall_document: index.html
domains:
  - domain: promptgoblin.io
    type: PRIMARY
  - domain: www.promptgoblin.io
    type: ALIAS
  - domain: promptgoblin.zatgeist.com
    type: ALIAS
    zone: zatgeist.com
ingress:
  rules:
    - match:
        path:
          prefix: /
        authority:
          exact: www.promptgoblin.io
      redirect:
        authority: promptgoblin.io
        scheme: https
        redirect_code: 301
    - match:
        path:
          prefix: /
        authority:
          exact: promptgoblin.zatgeist.com
      redirect:
        authority: promptgoblin.io
        scheme: https
        redirect_code: 301
    - match:
        path:
          prefix: /
      component:
        name: promptgoblin-site
