name: CI

on:
  pull_request:
  push:
    branches: [main]

# Supersede in-flight runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  functions:
    name: Functions unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # functions/ is zero-dependency: `npm test` runs build-sync + node tests
      # (138 checks, no keys, no network). No `npm ci` (there is no lockfile).
      - run: npm test

  web-unit:
    name: Web unit tests + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run test          # vitest (scan-api + scan-report honest-envelope)
      - run: npm run build         # next static export = typecheck gate

  web-lint:
    name: Web lint (advisory)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      # NON-BLOCKING until the 7 pre-existing eslint errors are cleaned up.
      # Flip `continue-on-error` to false to make lint a hard gate.
      - run: npm run lint
        continue-on-error: true

  web-ui:
    name: Web UI (Playwright) + a11y + screenshots
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build                              # produces web/out/ for `serve`
      - run: npx playwright install --with-deps chromium
      # NON-BLOCKING initially: the mobile hero currently fails axe color-contrast
      # (a real WCAG AA finding). Screenshots + report still upload below.
      # Flip `continue-on-error` to false once the mobile a11y findings are fixed.
      - run: npm run test:ui
        continue-on-error: true
      - name: Upload screenshots + Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-ui-screenshots-and-report
          path: |
            web/test-results
            web/playwright-report
          retention-days: 14
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # GATED DEPLOY — the site no longer auto-deploys on push (.do/app.yaml has
  # deploy_on_push:false). This job ships the site to DigitalOcean App Platform
  # ONLY after the blocking test jobs pass, and ONLY on a push to main.
  #
  # `needs:` is the gate: if `functions` or `web-unit` fails, this job is skipped
  # and nothing deploys. (web-lint / web-ui are advisory and intentionally NOT in
  # needs.) The 17 behavioral Stripe webhook tests run inside `web-unit`.
  #
  # PREREQS before this can work (see docs/stripe-cicd-gate-design.md):
  #   1. Apply the deploy_on_push:false flip:
  #        doctl apps update b2fc9d71-4cf8-41b0-ad84-696043cd2def --spec .do/app.yaml
  #      (until applied, DO ALSO auto-deploys → double deploy; harmless but noisy.)
  #   2. Confirm secrets.DIGITALOCEAN_ACCESS_TOKEN has Apps read+write scope
  #      (the functions deploy may only have Serverless scope).
  # To switch to fully-manual instead, change the trigger to workflow_dispatch
  # with a typed "deploy" confirm (mirror deploy.yml).
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy site (gated)
    needs: [functions, web-unit]
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Official DO action. Preferred over `doctl apps create-deployment --wait`,
      # which returns exit 0 even when the deploy fails (doctl #1071) — useless as
      # a CI signal. This action fails the step if the build/deploy fails.
      - name: Deploy to DigitalOcean App Platform
        uses: digitalocean/app_action/deploy@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          app_name: promptgoblin
          print_build_logs: "true"
          print_deploy_logs: "true"
