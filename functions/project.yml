parameters: {}
environment: {}
packages:
  - name: scan
    actions:
      # Tier 1 — free hygiene scan, no keys, runs for everyone.
      - name: tier1
        binary: false
        main: main
        runtime: 'nodejs:24'
        web: true
        limits:
          timeout: 20000
          memory: 256
      # Tier 2 — email-gated, rate-limited, single live engine (Perplexity).
      - name: tier2
        binary: false
        main: main
        runtime: 'nodejs:24'
        web: true
        limits:
          timeout: 25000
          memory: 256
        # PERPLEXITY_API_KEY is NOT bound here (never committed). Set it on the
        # deployed function when a key exists, e.g.:
        #   doctl serverless deploy . (this file) then in the DO console set the
        #   tier2 function env var PERPLEXITY_API_KEY, or redeploy with the env
        #   exported and the binding re-added. Until set, Tier-2 degrades honestly.
