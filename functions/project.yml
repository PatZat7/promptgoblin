parameters: {}
environment: {}
packages:
  - name: scan
    actions:
      # Tier 1 — free hygiene scan, no keys, runs for everyone.
      - name: tier1
        binary: false
        main: main
        runtime: 'nodejs:24'
        web: true
        limits:
          timeout: 20000
          memory: 256
        environment:
          # Injected at deploy from the gitignored functions/.env (doctl auto-loads it).
          # Optional — omit or leave blank to skip Scrapfly fallback and report WAF blocks honestly.
          SCRAPFLY_KEY: ${SCRAPFLY_KEY}
      # Tier 2 — email-gated, rate-limited, single live engine (Perplexity).
      - name: tier2
        binary: false
        main: main
        runtime: 'nodejs:24'
        web: true
        limits:
          timeout: 25000
          memory: 256
        environment:
          # Injected at deploy from the gitignored functions/.env (doctl auto-loads it).
          # The literal value is NEVER committed — only this reference name is.
          PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY}
