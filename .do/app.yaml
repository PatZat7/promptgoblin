# DigitalOcean App Platform spec — Prompt Goblin (Next.js, Node/SSR)
#
# CHANGED 2026-06-08: static_site -> Node web service. The dashboard (#5) needs a
# server at request time (SSR cookie auth, RLS under the user JWT, signed URLs),
# so web/ dropped `output:'export'`. Marketing routes still PRERENDER to static
# HTML inside this Node app; only /dashboard, /runs, /login, /auth/* are dynamic.
#
# Apply:  doctl apps update b2fc9d71-4cf8-41b0-ad84-696043cd2def --spec .do/app.yaml
#   (or via the DigitalOcean MCP / dashboard)
#
# SECRETS: SUPABASE_SERVICE_ROLE_KEY is NOT stored here (committed file). It is set
# as an app-level SECRET env out-of-band (dashboard / API) and must NEVER be
# committed or given a NEXT_PUBLIC_ prefix. The two NEXT_PUBLIC_ values below are
# publishable by design (browser-safe).
name: promptgoblin
region: nyc
features:
  - buildpack-stack=ubuntu-22
services:
  - name: promptgoblin-site
    github:
      repo: PatZat7/promptgoblin
      branch: main
      # GATED DEPLOY (2026-06-13): false so a raw `git push main` no longer
      # auto-ships. Deploys now run from GitHub Actions (.github/workflows/ci.yml
      # `deploy` job) ONLY after the test gates pass — see docs/stripe-cicd-gate-design.md.
      # Apply this flip once with: doctl apps update b2fc9d71-4cf8-41b0-ad84-696043cd2def --spec .do/app.yaml
      deploy_on_push: false
    source_dir: web
    environment_slug: node-js
    build_command: npm ci --include=dev && npm run build
    run_command: npm run start
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 1
    http_port: 8080
    envs:
      - key: NEXT_PUBLIC_SUPABASE_URL
        scope: RUN_AND_BUILD_TIME
        value: https://teeztxhrolhmmibxnnxi.supabase.co
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        scope: RUN_AND_BUILD_TIME
        value: sb_publishable_g6LcVsF3hxNrRoDBlevRIA_4KWRADUH
      # Authoritative site origin for server-generated magic links. MUST be set —
      # the webhook refuses to send a login link without it (no Host-header
      # fallback, which would let a forged Host phish the token).
      - key: NEXT_PUBLIC_SITE_URL
        scope: RUN_AND_BUILD_TIME
        value: https://promptgoblin.io
      # SUPABASE_SERVICE_ROLE_KEY — set as an app-level SECRET out-of-band (NOT here).
      # Stripe money path — also app-level SECRETs set out-of-band (NOT here):
      #   STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET (live-mode), RESEND_API_KEY,
      #   RESEND_FROM_EMAIL. Turn Resend click-tracking OFF for auth mail.
domains:
  - domain: promptgoblin.io
    type: PRIMARY
  - domain: www.promptgoblin.io
    type: ALIAS
  - domain: promptgoblin.zatgeist.com
    type: ALIAS
    zone: zatgeist.com
ingress:
  rules:
    - match:
        path:
          prefix: /
        authority:
          exact: www.promptgoblin.io
      redirect:
        authority: promptgoblin.io
        scheme: https
        redirect_code: 301
    - match:
        path:
          prefix: /
        authority:
          exact: promptgoblin.zatgeist.com
      redirect:
        authority: promptgoblin.io
        scheme: https
        redirect_code: 301
    - match:
        path:
          prefix: /
      component:
        name: promptgoblin-site
