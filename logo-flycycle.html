const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');
const logoImg = new Image(); logoImg.src = LOGO_B64;

const COLOR  = [167,238,57];
const DOT    = 3;
const PERIOD = 8;
const SMALL  = 0.42;          // arrival size vs the big logo
const TOP_Y  = 0.07;          // top margin for the small logo (fraction of height)

// timeline (fractions of cycle)
const GRAN     = [0.08, 0.18]; // big solid -> dots
const FLY_OUT  = [0.18, 0.40]; // dots streak off right (accelerate)
const FLY_IN   = [0.50, 0.70]; // dots streak back in from right (decelerate), now small
const SOLIDIFY = [0.70, 0.78]; // dots -> small solid logo
const FADE_S   = [0.90, 0.98]; // small logo fades, loop restarts big
const FLY_STAGGER = 0.05;

let dpr=1, W=0, H=0;
const N = PTS.length/2, dot=[];
for (let i=0;i<N;i++) dot.push({hx:PTS[i*2], hy:PTS[i*2+1], ph:Math.random()*Math.PI*2, rank:Math.random()});

function resize(){
  dpr = window.devicePixelRatio || 1;
  W = cv.width  = Math.round(innerWidth  * dpr);
  H = cv.height = Math.round(innerHeight * dpr);
}
resize(); addEventListener('resize', resize);

const clamp = (x,a,b)=>Math.max(a,Math.min(b,x));
const seg   = (t,a,b)=>clamp((t-a)/(b-a),0,1);

let start = performance.now();
addEventListener('pointerdown', ()=> start = performance.now());

function frame(ms){
  const t   = ((ms-start)/1000) % PERIOD / PERIOD;
  const sec = ms/1000;
  ctx.clearRect(0,0,W,H);

  const fit = Math.min(W/ASPECT, H) * 0.60;
  const lw = fit*ASPECT, lh = fit;                 // big
  const ox = (W-lw)/2, oy = (H-lh)/2;              // big centred
  const lws = lw*SMALL, lhs = lh*SMALL;            // small
  const sox = (W-lws)/2, soy = H*TOP_Y;            // small top-centred
  const D   = W*1.25 + lw;                         // clear the right edge

  const gran = seg(t, GRAN[0], GRAN[1]);
  const soli = seg(t, SOLIDIFY[0], SOLIDIFY[1]);

  // ---- BIG solid logo (loop-start reveal -> granulate)
  const bigA = seg(t, 0.00, 0.05) * (1 - gran);
  if (bigA > 0.01 && logoImg.complete){
    ctx.globalAlpha = bigA; ctx.drawImage(logoImg, ox, oy, lw, lh); ctx.globalAlpha = 1;
  }

  // ---- SMALL solid logo (forms after the fly-in -> holds -> fades)
  const smallA = soli * (1 - seg(t, FADE_S[0], FADE_S[1]));
  if (smallA > 0.01 && logoImg.complete){
    ctx.globalAlpha = smallA; ctx.drawImage(logoImg, sox, soy, lws, lhs); ctx.globalAlpha = 1;
  }

  // ---- DOTS: streak out from big, streak back in to small
  const outPhase = (t >= FLY_OUT[0] && t < FLY_IN[0]);
  const inPhase  = (t >= FLY_IN[0]  && t <= SOLIDIFY[1]);
  let dotsA = 0;
  if (t >= GRAN[0] && t < FLY_IN[0]) dotsA = gran;          // gran + fly out
  else if (inPhase)                  dotsA = 1 - soli;       // fly in, fade at solidify

  if (dotsA > 0){
    for (let i=0;i<N;i++){
      const d = dot[i];
      let x, y, streak;
      if (inPhase){
        // mirror of the exit: come from off the right, decelerate into the SMALL logo
        const ia = FLY_IN[0] + d.rank*FLY_STAGGER;
        const ip = seg(t, ia, FLY_IN[1]);
        const ie = 1-(1-ip)*(1-ip);            // ease-out
        x = sox + d.hx*lws + (1-ie)*D;          // already at small scale on the way in
        y = soy + d.hy*lhs;
        streak = (1-ip);
      } else {
        const oa = FLY_OUT[0] + d.rank*FLY_STAGGER;
        const op = seg(t, oa, FLY_OUT[1]);
        x = ox + d.hx*lw + (op*op)*D;           // ease-in accelerate off right
        y = oy + d.hy*lh;
        streak = op;
      }
      const tw = 0.5 + 0.30*Math.sin(sec*2.0 + d.ph) + 0.20*Math.sin(sec*5.3 + d.ph*1.7);
      const a  = dotsA * clamp(0.35 + 0.65*tw, 0, 1);
      if (a <= 0.01) continue;
      ctx.fillStyle = `rgba(${COLOR[0]},${COLOR[1]},${COLOR[2]},${a.toFixed(3)})`;
      const w = DOT*(1 + streak*6);
      ctx.fillRect(x-w/2, y-DOT/2, w, DOT);
    }
  }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
